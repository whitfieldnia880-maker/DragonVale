  <line x1="117" y1="280" x2="55" y2="210" stroke="#e74c3c" stroke-width="2" opacity="0.35"/>
  <line x1="395" y1="280" x2="432" y2="187" stroke="#e74c3c" stroke-width="2.5" opacity="0.5"/>
  <line x1="395" y1="280" x2="457" y2="210" stroke="#e74c3c" stroke-width="2" opacity="0.35"/>
  <!-- Tail -->
  <path d="M325 347 Q400 387 421 432 Q395 400 347 379Z" fill="#c0392b"/>
