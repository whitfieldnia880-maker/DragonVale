  <circle cx="222" cy="195" r="13" fill="#1a0500"/>
  <circle cx="216" cy="189" r="5" fill="#fff"/>
  <!-- Eye right -->
  <circle cx="293" cy="192" r="21" fill="#fff"/>
  <circle cx="296" cy="195" r="13" fill="#1a0500"/>
  <circle cx="290" cy="189" r="5" fill="#fff"/>
